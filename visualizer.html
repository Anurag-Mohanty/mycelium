<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium — Engineered Curiosity</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a14; color: #d0d0dc;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    overflow: hidden; height: 100vh;
    display: flex; flex-direction: column;
}

/* === HEADER === */
.header {
    padding: 14px 24px 10px; border-bottom: 1px solid #1e1e30;
    flex-shrink: 0;
}
.header-top { display: flex; align-items: baseline; gap: 14px; }
.title { color: #8b7ff8; font-size: 22px; font-weight: bold; letter-spacing: 3px; }
.subtitle { color: #6a6a80; font-size: 13px; font-style: italic; }
.source-info { font-size: 12px; color: #9898b0; margin-top: 4px; }
.budget-row { display: flex; align-items: center; gap: 14px; margin-top: 8px; }
.budget-bar { flex: 1; max-width: 320px; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden; }
.budget-fill { height: 100%; background: #8b7ff8; transition: width 0.5s ease; width: 0%; }
.budget-text { font-size: 13px; color: #b0b0c0; }
.stats-row { display: flex; gap: 24px; margin-top: 6px; font-size: 12px; color: #9090a4; }
.stats-row span { color: #d0d0e0; font-weight: bold; }
.phase-bar { display: flex; gap: 3px; margin-top: 8px; }
.phase-step { padding: 3px 10px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; border-radius: 2px; background: #14141e; color: #4a4a60; }
.phase-step.active { background: #8b7ff8; color: #fff; }
.phase-step.done { background: #1a2e1a; color: #5cb85c; }

/* === MAIN LAYOUT: tree left, right panel === */
.main { display: flex; flex: 1; overflow: hidden; }
.tree-container { flex: 1; position: relative; }
.tree-container svg { width: 100%; height: 100%; }

/* Right panel with tabs */
.right-panel {
    width: 380px; border-left: 1px solid #1e1e30;
    display: flex; flex-direction: column;
    flex-shrink: 0; overflow: hidden;
}
.panel-tabs {
    display: flex; border-bottom: 1px solid #1e1e30; flex-shrink: 0;
}
.panel-tab {
    flex: 1; padding: 8px 10px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: #6a6a80; text-align: center; cursor: pointer;
    border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
}
.panel-tab:hover { color: #9898b0; }
.panel-tab.active { color: #8b7ff8; border-bottom-color: #8b7ff8; }
.panel-tab .tab-count { font-size: 9px; color: #4a4a60; margin-left: 3px; }
.panel-tab.active .tab-count { color: #6a6ab0; }
.panel-content { flex: 1; overflow-y: auto; display: none; }
.panel-content.active { display: block; }
.log-body { padding: 8px 16px; }
.kg-body { padding: 16px; }
.bb-body { padding: 16px; }

/* Log entries */
.log-entry { padding: 4px 0; font-size: 11px; line-height: 1.6; color: #9898b0; border-bottom: 1px solid #0e0e18; }
.log-entry.genesis { color: #b0a0e0; }
.log-entry.planner { color: #80c0a0; }
.log-entry.reasoning { color: #a0b8d0; }
.log-entry.resolved { color: #60c080; }
.log-entry.decomposing { color: #9088c0; }
.log-entry.finding { color: #d4a030; }
.log-entry.validation { color: #c0a060; }
.log-entry.significance { color: #e0b840; }
.log-entry.impact { color: #ff8844; }
.log-entry.phase { color: #8b7ff8; font-weight: bold; font-size: 12px; padding: 8px 0 4px; border-bottom: 1px solid #1e1e30; }
.log-step { font-size: 9px; text-transform: uppercase; color: #6a6a80; letter-spacing: 1px; }
.log-content { margin-top: 2px; color: #c0c0d4; }

/* Finding cards in log */
.log-finding { margin: 6px 0; padding: 8px 12px; border-radius: 4px; background: #12121e; font-size: 11px; line-height: 1.5; }
.log-finding.headline { border-left: 3px solid #e0b840; }
.log-finding.significant { border-left: 3px solid #8b7ff8; }
.log-finding.noted { border-left: 3px solid #333; }

/* === NODE DETAIL OVERLAY === */
.detail-overlay {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 480px; background: #0e0e1a; border-left: 2px solid #8b7ff8;
    z-index: 40; transform: translateX(100%);
    transition: transform 0.25s ease;
    overflow-y: auto; padding: 20px 24px;
}
.detail-overlay.active { transform: translateX(0); }
.detail-overlay-backdrop {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3); z-index: 35;
    display: none;
}
.detail-overlay-backdrop.active { display: block; }

.detail-close { float: right; background: none; border: none; color: #6a6a80; font-size: 20px; cursor: pointer; font-family: inherit; }
.detail-close:hover { color: #fff; }
.detail-title { color: #8b7ff8; font-size: 16px; font-weight: bold; }
.detail-scope { color: #b0b0c4; font-size: 12px; margin: 6px 0 12px; line-height: 1.5; }
.detail-meta { font-size: 11px; color: #8888a0; margin-bottom: 14px; }
.detail-meta .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
.detail-section { margin-top: 16px; }
.detail-section-label { font-size: 9px; text-transform: uppercase; color: #6a6a80; letter-spacing: 1px; margin-bottom: 8px; }
.reasoning-step { margin: 8px 0; padding: 8px 14px; border-left: 3px solid #333; font-size: 12px; line-height: 1.5; color: #c0c0d4; }
.reasoning-step.survey { border-color: #4a7ab0; }
.reasoning-step.orient { border-color: #3da06e; }
.reasoning-step.hypothesize { border-color: #d0901d; }
.reasoning-step.assess { border-color: #7b5fc0; }
.step-label { font-size: 9px; text-transform: uppercase; color: #7a7a90; letter-spacing: 1px; margin-bottom: 3px; }
.detail-finding { margin-top: 14px; padding: 10px 12px; background: #14141e; border-radius: 4px; font-size: 11px; line-height: 1.5; color: #b0b0c4; }
.detail-finding-label { font-size: 9px; color: #6a6a80; text-transform: uppercase; margin-bottom: 4px; }

/* Detail panel badges */
.detail-badge {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    margin-right: 6px;
}
.detail-badge.manager { background: #1a1a3e; color: #9b7fe0; border: 1px solid #3a3a5e; }
.detail-badge.worker { background: #1a2e1a; color: #5cb85c; border: 1px solid #2a3e2a; }
.detail-badge.reviewing { background: #2e2a1a; color: #d0a040; border: 1px solid #3e3a2a; }

/* Observation list in detail panel */
.obs-item {
    margin: 6px 0; padding: 8px 12px; background: #12121e; border-radius: 4px;
    font-size: 11px; line-height: 1.5; cursor: pointer;
}
.obs-item:hover { background: #16162a; }
.obs-item-summary { color: #b0b0c4; }
.obs-item-detail { display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid #1e1e30; color: #8888a0; font-size: 10px; }
.obs-item.expanded .obs-item-detail { display: block; }

/* Turn 2 child classification badges */
.child-review {
    margin: 6px 0; padding: 8px 12px; background: #12121e; border-radius: 4px;
    font-size: 11px; line-height: 1.5;
}
.classify-badge {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 8px; letter-spacing: 0.5px; text-transform: uppercase;
    font-weight: bold;
}
.classify-badge.met { background: #1a2e1a; color: #5cb85c; }
.classify-badge.exhausted { background: #1a1a3e; color: #6a9ad0; }
.classify-badge.poor { background: #2e1a1a; color: #ef6f6f; }

/* Reassessment display */
.reassessment-box {
    margin: 8px 0; padding: 10px 14px; border-radius: 4px;
    border-left: 3px solid #8b7ff8; background: #12121e;
    font-size: 11px; line-height: 1.6;
}
.reassessment-decision {
    font-size: 12px; font-weight: bold; letter-spacing: 1px;
}
.reassessment-decision.resolve { color: #5cb85c; }
.reassessment-decision.investigate { color: #d0901d; }
.reassessment-decision.hire { color: #9b7fe0; }

/* Knowledge graph placeholder */
.kg-placeholder {
    text-align: center; padding: 40px 20px; color: #4a4a60;
}
.kg-placeholder .kg-icon { font-size: 32px; margin-bottom: 12px; color: #2a2a3e; }
.kg-stat { display: inline-block; margin: 8px 12px; text-align: center; }
.kg-stat .num { font-size: 20px; color: #6a6a80; font-weight: bold; }
.kg-stat .lbl { font-size: 9px; color: #4a4a60; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* Bulletin board placeholder */
.bb-placeholder {
    text-align: center; padding: 40px 20px; color: #4a4a60;
}

/* === TREE NODES === */
.link { fill: none; stroke: #1e1e30; stroke-width: 1.5px; pointer-events: stroke; }
.link.followup { stroke: #8b7ff8; stroke-dasharray: 4,3; stroke-width: 1px; }
.node { cursor: pointer; }
.node circle { stroke-width: 2px; transition: fill 0.3s, r 0.3s; }
.node.exploring circle { fill: #4a7ab0; stroke: #6a9ad0; animation: pulse 1.5s infinite; }
.node.resolved circle { fill: #3da06e; stroke: #5dc08e; }
.node.synthesizing circle { fill: #7b5fc0; stroke: #9b7fe0; animation: pulse 1s infinite; }
.node.decomposing circle { fill: #5a9a5a; stroke: #7aba7a; }
.node.idle circle { fill: #2a2a3e; stroke: #3a3a4e; }
.node.reviewing circle { fill: #d0901d; stroke: #e0a030; animation: pulse 1.2s infinite; }
.node.delegating circle { fill: #5a9a5a; stroke: #7aba7a; }
.node.waiting_for_children circle { fill: #5a9a5a; stroke: #7aba7a; animation: pulse 2s infinite; }
.node.complete circle { fill: #3da06e; stroke: #5dc08e; }
.node.selected circle { stroke: #fff !important; stroke-width: 3px; }
.node .label { font-size: 8px; fill: #9898b0; pointer-events: none; text-anchor: middle; }
.node .obs-badge { font-size: 7px; fill: #fff; pointer-events: none; text-anchor: middle; dominant-baseline: central; }

/* Manager promotion badge on node */
.node .promoted-badge { font-size: 7px; fill: #d0901d; pointer-events: none; text-anchor: middle; }

/* Turn 2 classification ring */
.node .classify-ring { fill: none; stroke-width: 2px; pointer-events: none; }

/* Tooltip */
.tooltip { position: fixed; z-index: 30; pointer-events: none; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; padding: 8px 12px; font-size: 11px; max-width: 320px; display: none; line-height: 1.4; color: #c0c0d0; }

/* Summary overlay */
.summary-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,10,20,0.92); z-index: 50; display: none; align-items: center; justify-content: center; }
.summary-overlay.active { display: flex; }
.summary-box { background: #12121e; border: 1px solid #333; border-radius: 8px; padding: 32px 40px; max-width: 620px; width: 92%; line-height: 1.6; }
.summary-box h2 { color: #8b7ff8; font-size: 13px; letter-spacing: 2px; margin-bottom: 14px; text-transform: uppercase; }
.summary-stats { font-size: 13px; color: #b0b0c4; margin-bottom: 16px; }
.summary-finding { margin: 10px 0; padding: 12px 16px; border-radius: 4px; background: #0a0a14; font-size: 12px; line-height: 1.5; }
.summary-finding.headline { border-left: 3px solid #e0b840; }
.summary-finding.significant { border-left: 3px solid #8b7ff8; }
.summary-finding h3 { font-size: 10px; color: #e0b840; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.summary-finding p { color: #c0c0d4; }

/* Playback bar */
.playback-bar { display: none; padding: 8px 20px; background: #0e0e18; border-top: 1px solid #1e1e30; align-items: center; gap: 12px; font-size: 11px; flex-shrink: 0; color: #9898b0; }
.playback-bar.active { display: flex; }
.playback-bar button { background: #1a1a2e; color: #b0b0c0; border: 1px solid #333; padding: 4px 14px; border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; }
.playback-bar button:hover { color: #fff; border-color: #8b7ff8; }
.playback-bar input[type=range] { flex: 1; accent-color: #8b7ff8; }
.playback-bar select { background: #1a1a2e; color: #b0b0c0; border: 1px solid #333; padding: 3px 8px; border-radius: 3px; font-family: inherit; }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

/* === GENESIS ROOT NODE === */
.node.genesis-root circle { fill: #8b7ff8; stroke: #a99bff; }
.node.genesis-root .label { fill: #8b7ff8; font-size: 9px; font-weight: bold; }
.node.equip-placeholder circle { fill: #1a1a2e; stroke: #3a3a5e; stroke-dasharray: 3,2; }
.node.equip-placeholder .label { fill: #4a4a60; font-size: 8px; font-style: italic; }
.node.equip-preparing circle { fill: #1a3a3a; stroke: #30b0b0; animation: pulse 1.5s infinite; }
.node.equip-preparing .label { fill: #30b0b0; font-size: 8px; font-weight: bold; }
.node.equip-ready circle { fill: #1a3a2a; stroke: #3da06e; }
.node.equip-ready .label { fill: #3da06e; font-size: 8px; font-weight: bold; }
.node.equip-failed circle { fill: #3a1a1a; stroke: #ef6f6f; }
.node.equip-failed .label { fill: #ef6f6f; font-size: 8px; font-weight: bold; }

/* === BUDGET FLOW ANIMATION === */
@keyframes budgetPulse {
    0% { stroke-opacity: 0.3; stroke-width: 1.5px; }
    50% { stroke-opacity: 1; stroke-width: 3px; }
    100% { stroke-opacity: 0.3; stroke-width: 1.5px; }
}
.link.budget-flowing { animation: budgetPulse 0.8s ease-in-out; stroke: #8b7ff8; }
.link-hover-label {
    font-size: 8px; fill: #8888a0; pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
}

/* === DECOMPOSITION OVERLAY === */
@keyframes managerGlow {
    0% { filter: drop-shadow(0 0 2px #8b7ff8); }
    50% { filter: drop-shadow(0 0 12px #8b7ff8); }
    100% { filter: drop-shadow(0 0 2px #8b7ff8); }
}
.node.decomposing-glow circle { animation: managerGlow 1s ease-in-out; }
.decomp-overlay {
    position: absolute; pointer-events: none; z-index: 20;
    background: rgba(14,14,26,0.92); border: 1px solid #333; border-radius: 6px;
    padding: 10px 14px; max-width: 280px; font-size: 10px; line-height: 1.5;
    color: #b0b0c4; opacity: 0; transition: opacity 0.3s;
}
.decomp-overlay.visible { opacity: 1; pointer-events: auto; }
.decomp-overlay .decomp-title { color: #9b7fe0; font-weight: bold; font-size: 11px; margin-bottom: 6px; }
.decomp-overlay .decomp-roles { margin-top: 6px; }
.decomp-overlay .decomp-role { color: #5cb85c; font-size: 10px; padding: 1px 0; }

/* === REASONING CHOICE MARKERS === */
.node .decision-marker {
    font-size: 7px; fill: #8888a0; pointer-events: none;
    text-anchor: middle; dominant-baseline: central;
}
.node .decision-marker.hire { fill: #9b7fe0; }
.node .decision-marker.resolve { fill: #5cb85c; }
.node .decision-marker.investigate { fill: #d0901d; }

/* === CASCADE DETECTION === */
.cascade-badge {
    font-size: 7px; text-anchor: middle; pointer-events: none;
    dominant-baseline: central;
}
.cascade-badge.cascade { fill: #d0901d; }
.cascade-badge.independent { fill: #5cb85c; }
.cascade-line { stroke-dasharray: 4,3; stroke-width: 1px; fill: none; opacity: 0.6; }
.cascade-line.cascade { stroke: #d0901d; }
.cascade-line.independent { stroke: #5cb85c; }

/* === LATERAL EDGES (bulletin board influence) === */
.lateral-edge { fill: none; stroke: #8b7ff8; stroke-width: 1px; stroke-dasharray: 6,4; opacity: 0.5; }

/* === BULLETIN BOARD PANEL === */
.bb-post-card {
    margin: 6px 0; padding: 8px 12px; background: #12121e; border-radius: 4px;
    font-size: 11px; line-height: 1.5; cursor: pointer; border-left: 3px solid #333;
}
.bb-post-card:hover { background: #16162a; }
.bb-post-card.type-OBSERVATION { border-left-color: #4a7ab0; }
.bb-post-card.type-HYPOTHESIS { border-left-color: #9b7fe0; }
.bb-post-card.type-DEAD_END { border-left-color: #6a6a80; }
.bb-post-type {
    display: inline-block; font-size: 8px; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 1px 5px; border-radius: 2px;
    font-weight: bold;
}
.bb-post-type.OBSERVATION { background: #1a2a3e; color: #4a7ab0; }
.bb-post-type.HYPOTHESIS { background: #1a1a3e; color: #9b7fe0; }
.bb-post-type.DEAD_END { background: #1a1a1a; color: #6a6a80; }
.bb-post-type.EQUIP_BRIEFING { background: #0e2a2a; color: #30b0b0; }
.bb-post-card.type-EQUIP_BRIEFING { border-left-color: #30b0b0; background: #0e1a1a; }
.bb-post-card.type-EQUIP_BRIEFING .bb-post-detail { white-space: pre-wrap; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 10px; }
.bb-post-author { font-size: 9px; color: #6a6a80; margin-left: 6px; }
.bb-post-content { margin-top: 4px; color: #b0b0c4; }
.bb-post-detail { display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid #1e1e30; font-size: 10px; color: #8888a0; }
.bb-post-card.expanded .bb-post-detail { display: block; }
.bb-pull-marker {
    display: inline-block; font-size: 8px; color: #4a4a60; margin-top: 4px;
    padding: 1px 4px; background: #0e0e18; border-radius: 2px;
}
.bb-pull-marker.influenced { color: #d0901d; background: #1e1a14; }

/* === KNOWLEDGE GRAPH PANEL === */
.kg-graph-svg { width: 100%; height: 340px; }
.kg-node-circle { cursor: pointer; }
.kg-node-label { font-size: 7px; fill: #9898b0; pointer-events: none; text-anchor: middle; }
.kg-edge-line { stroke: #2a2a3e; stroke-width: 1px; }
.kg-edge-label { font-size: 6px; fill: #4a4a60; text-anchor: middle; }
.kg-provenance-popup {
    position: absolute; z-index: 25; background: #14141e; border: 1px solid #333;
    border-radius: 4px; padding: 10px 14px; font-size: 10px; line-height: 1.5;
    color: #b0b0c4; max-width: 260px; display: none;
}
.kg-provenance-popup.visible { display: block; }

/* === PHASE STAGING HEADER STRIP === */
.phase-stage-strip {
    padding: 4px 24px; font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; display: none; transition: all 0.3s;
}
.phase-stage-strip.active { display: block; }
.phase-stage-strip.catalog { background: #14141e; color: #6a9ad0; border-bottom: 1px solid #1a2a3e; }
.phase-stage-strip.genesis { background: #14141e; color: #b0a0e0; border-bottom: 1px solid #2a1a3e; }
.phase-stage-strip.exploration { background: #0e1a14; color: #5cb85c; border-bottom: 1px solid #1a2e1a; }
.phase-stage-strip.deep_dive { background: #1a1414; color: #d0901d; border-bottom: 1px solid #2e1a1a; }
.phase-stage-strip.validation { background: #1a1a14; color: #d0a040; border-bottom: 1px solid #2e2a1a; }
.phase-stage-strip.significance { background: #1a1a14; color: #e0b840; border-bottom: 1px solid #2e2a1a; }
.phase-stage-strip.equip { background: #0e1a1a; color: #30b0b0; border-bottom: 1px solid #1a3a3a; }
.phase-stage-strip.impact { background: #1a1410; color: #ff8844; border-bottom: 1px solid #2e1a10; }
</style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="title">MYCELIUM</div>
        <div class="subtitle">Engineered Curiosity</div>
    </div>
    <div class="source-info" id="source-info">Connecting...</div>
    <div class="budget-row">
        <div class="budget-bar"><div class="budget-fill" id="budget-fill"></div></div>
        <div class="budget-text" id="budget-text">$0.00 / $10.00 (0%)</div>
    </div>
    <div class="stats-row">
        <div>Nodes: <span id="stat-nodes">0</span></div>
        <div>Observations: <span id="stat-obs">0</span></div>
        <div>Depth: <span id="stat-depth">0</span></div>
        <div>Findings: <span id="stat-findings">0</span></div>
    </div>
    <div class="phase-bar" id="phase-bar">
        <div class="phase-step" data-phase="catalog">Catalog</div>
        <div class="phase-step" data-phase="genesis">Genesis</div>
        <div class="phase-step" data-phase="equip">Equip</div>
        <div class="phase-step" data-phase="exploration">Explore</div>
        <div class="phase-step" data-phase="deep_dive">Deep-dive</div>
        <div class="phase-step" data-phase="validation">Validate</div>
        <div class="phase-step" data-phase="significance">Score</div>
        <div class="phase-step" data-phase="impact">Impact</div>
    </div>
</div>

<div class="phase-stage-strip" id="phase-stage-strip"></div>

<div class="main">
    <div class="tree-container" id="tree-container">
        <svg id="tree-svg"></svg>
        <div class="decomp-overlay" id="decomp-overlay"></div>
        <div class="kg-provenance-popup" id="kg-provenance-popup"></div>
    </div>
    <div class="right-panel">
        <div class="panel-tabs">
            <div class="panel-tab active" data-tab="activity" onclick="switchTab('activity')">Activity</div>
            <div class="panel-tab" data-tab="kg" onclick="switchTab('kg')">Graph <span class="tab-count" id="kg-count">0</span></div>
            <div class="panel-tab" data-tab="bb" onclick="switchTab('bb')">Bulletin <span class="tab-count" id="bb-count">0</span></div>
        </div>
        <div class="panel-content active" data-tab="activity">
            <div class="log-body" id="log-body"></div>
        </div>
        <div class="panel-content" data-tab="kg">
            <div class="kg-body" id="kg-body">
                <div style="display:flex;justify-content:center;gap:24px;padding:8px 0 4px">
                    <div class="kg-stat"><div class="num" id="kg-entities">0</div><div class="lbl">entities</div></div>
                    <div class="kg-stat"><div class="num" id="kg-relations">0</div><div class="lbl">relationships</div></div>
                </div>
                <svg class="kg-graph-svg" id="kg-graph-svg"></svg>
            </div>
        </div>
        <div class="panel-content" data-tab="bb">
            <div class="bb-body" id="bb-body">
                <div style="font-size:10px;color:#6a6a80;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">
                    Bulletin Board <span style="color:#4a4a60" id="bb-posts-label">0 posts</span>
                </div>
                <div id="bb-posts-container"></div>
            </div>
        </div>
    </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="detail-overlay-backdrop" id="detail-backdrop"></div>
<div class="detail-overlay" id="detail-overlay"></div>
<div class="summary-overlay" id="summary-overlay"><div class="summary-box" id="summary-box"></div></div>

<div class="playback-bar" id="playback-bar">
    <button id="play-btn" onclick="togglePause()">Pause</button>
    <input type="range" id="scrub" min="0" max="100" value="0" oninput="scrubTo(this.value)">
    <select onchange="setSpeed(this.value)"><option value="0.5">0.5x</option><option value="1">1x</option><option value="2">2x</option><option value="5">5x</option><option value="10" selected>10x</option><option value="20">20x</option></select>
    <span id="playback-time">0:00 / 0:00</span>
</div>

<script>
// === STATE ===
const nodes = new Map();
let totalNodes=0, totalObs=0, maxDepth=0, totalFindings=0;
let selectedNodeId = null;
let headlineFindings=[], significantFindings=[];
let followupLinks = []; // parent_node -> child_node for continuation lineage
let kgEntities=0, kgRelations=0, bbPosts=0;
let currentPhase = '';

// Bulletin board state
const bbPostsList = []; // full post objects
const bbPullsList = []; // full pull objects

// Knowledge graph visualization state
const kgNodes = []; // {id, name, type, observation_count}
const kgEdges = []; // {source, target, relationship_type}
let kgSimulation = null;

// Lateral edges (bulletin board influence lines in tree)
const lateralEdges = []; // {source_node_id, target_node_id}

// Budget flow tracking
const budgetAllocations = new Map(); // parent_id -> [{child_id, amount}]

// Cascade analysis results
const cascadeResults = new Map(); // node_id -> cascade_analysis array

// Decomposition overlay timer
let decompOverlayTimer = null;

// EQUIP node tracking
let equipNodeId = null; // populated when EQUIP node_spawned arrives
let equipStatus = 'placeholder'; // placeholder | preparing | ready | failed
let equipBriefingContent = ''; // SKILL.md content from EQUIP_BRIEFING post

// === TAB SWITCHING ===
function switchTab(tab) {
    document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.querySelectorAll('.panel-content').forEach(c => c.classList.toggle('active', c.dataset.tab === tab));
}

// === D3 ===
const svg = d3.select('#tree-svg');
const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.1,4]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);
const linkGroup = g.append('g');
const nodeGroup = g.append('g');

function initZoom() {
    const w = document.getElementById('tree-container').clientWidth;
    svg.call(zoom.transform, d3.zoomIdentity.translate(w/2, 50).scale(0.7));
}

// === WEBSOCKET ===
let ws=null, isPlayback=false;
function connectWS() {
    ws = new WebSocket('ws://localhost:8765');
    ws.onopen = () => { document.getElementById('source-info').textContent = 'Connected — waiting for genesis...'; };
    ws.onclose = () => { finalizeAll(); };
    ws.onmessage = e => handleEvent(JSON.parse(e.data));
}

function finalizeAll() {
    nodes.forEach(n => { if(n.status==='exploring'||n.status==='synthesizing') n.status='resolved'; });
    updateTree();
    document.getElementById('source-info').textContent = 'Exploration complete';
    showSummary();
}

// === EVENT HANDLER ===
function handleEvent(evt) {
    switch(evt.type) {
        case 'phase_change': {
            const phase = evt.phase || evt.to_phase || '';
            currentPhase = phase;
            document.getElementById('source-info').textContent = `Phase: ${phase.replace(/_/g,' ').toUpperCase()}`;
            updatePhaseBar(phase);
            updatePhaseStageStrip(phase);
            addLog('phase', `--- ${phase.replace(/_/g,' ').toUpperCase()} ---`);
            break;
        }

        case 'connect': {
            showSourceSelection(evt);
            break;
        }

        case 'source_response': {
            showSourceResponse(evt);
            break;
        }

        case 'source_info': {
            document.getElementById('source-info').textContent = `Source: ${evt.source_name || ''}`;
            break;
        }

        case 'catalog_progress': {
            const pct = evt.percent || 0;
            document.getElementById('source-info').textContent =
                `Cataloging: ${evt.scanned || 0} / ${evt.total || '?'} records scanned (${pct}%)`;
            break;
        }

        case 'present_tiers': {
            showTierSelection(evt);
            break;
        }

        case 'budget_authorized': {
            hideTierSelection();
            document.getElementById('source-info').textContent = `Budget: $${(evt.budget||0).toFixed(2)} authorized`;
            break;
        }

        case 'catalog_complete': {
            const clusters = evt.clusters || [];
            const lines = [`Cataloged ${evt.total_records} records — ${evt.anomaly_clusters} anomaly clusters found:`];
            for (const c of clusters.slice(0, 5)) {
                lines.push(`  [${c.severity.toUpperCase()}] ${c.name}`);
            }
            addLogBlock('genesis', 'CATALOG', lines);
            document.getElementById('source-info').textContent =
                `Cataloged ${evt.total_records} records | ${evt.anomaly_clusters} anomaly clusters`;
            break;
        }

        case 'genesis_reasoning': {
            const summary = evt.corpus_summary || '';
            const lenses = evt.lenses || [];
            const cut = evt.recommended_cut || '';
            addLogBlock('genesis', 'GENESIS', [
                summary.slice(0, 200),
                '',
                '• Lenses: ' + lenses.slice(0, 6).join(', '),
                cut ? '• Decomposition: ' + cut.slice(0, 120) : '',
            ].filter(Boolean));
            document.getElementById('source-info').textContent = summary.slice(0, 120);
            break;
        }

        case 'planner_reasoning': {
            const segs = evt.segments || [];
            const lines = [`Splitting into ${segs.length} segments, ~${evt.estimated_nodes} nodes:`];
            for (const s of segs.slice(0, 8)) {
                lines.push(`• ${s.name}  $${(s.budget||0).toFixed(2)}  ~${s.nodes} nodes`);
                if (s.reasoning) lines.push(`  ${s.reasoning.slice(0, 70)}`);
            }
            if (evt.deep_dive_strategy) lines.push(`• Deep-dive: ${evt.deep_dive_strategy.slice(0, 80)}`);
            addLogBlock('planner', 'PLANNER', lines);
            break;
        }

        case 'node_spawned': {
            // Detect EQUIP node — populate the placeholder instead of creating a new tree node
            if (evt.tree_position === 'EQUIP') {
                equipNodeId = evt.node_id;
                equipStatus = 'preparing';
                // Store EQUIP data in nodes map for detail overlay
                nodes.set(evt.node_id, {
                    id:evt.node_id, parent_id:evt.parent_id, position:'EQUIP',
                    status:'equip-preparing', obs_count:0, scope:'Workspace Prep',
                    segment:'', reasoning:{}, cost:0, top_observation:'',
                    children_scopes:[], budget_allocated:evt.budget||0, budget_spent:0,
                    role_name:evt.role_name||'workspace_prep', mission:evt.mission||'', bar:evt.bar||'',
                    scope_level:'', was_promoted:false, reassessment:null,
                    turn2:null, turn2_decision:'', child_classifications:{},
                    observations:[], self_evaluation:null,
                    is_followup:false, followup_reason:'', formation_decision:'',
                    is_equip: true,
                });
                totalNodes++;
                document.getElementById('stat-nodes').textContent = totalNodes;
                updateTree();
                break;
            }
            nodes.set(evt.node_id, {
                id:evt.node_id, parent_id:evt.parent_id, position:evt.tree_position,
                status:'exploring', obs_count:0, scope:evt.scope_summary||'',
                segment:evt.segment_id||'', reasoning:{}, cost:0, top_observation:'',
                children_scopes:[], budget_allocated:evt.budget||0, budget_spent:0,
                // Role fields (populated if emitted)
                role_name:evt.role_name||'', mission:evt.mission||'', bar:evt.bar||'',
                scope_level:evt.scope_level||'',
                // State tracking
                was_promoted: false, // worker -> manager mid-investigation
                reassessment: null, // RESOLVE / INVESTIGATE_FURTHER / HIRE
                turn2: null, // Turn 2 review output
                turn2_decision: '', // continue / resolve
                child_classifications: {}, // child_id -> classification
                observations: [], // observation list
                self_evaluation: null,
                is_followup: false, // continuation from Turn 2
                followup_reason: '',
                // Reasoning markers
                formation_decision: '', // investigate or hire
            });
            totalNodes++;
            document.getElementById('stat-nodes').textContent = totalNodes;
            // Track budget allocation from parent
            if (evt.parent_id && evt.budget) {
                if (!budgetAllocations.has(evt.parent_id)) budgetAllocations.set(evt.parent_id, []);
                budgetAllocations.get(evt.parent_id).push({ child_id: evt.node_id, amount: evt.budget });
                // Trigger budget flow animation on the edge
                triggerBudgetFlowAnimation(evt.parent_id, evt.node_id);
            }
            // Don't log spawns — they're noise. The reasoning events tell the story.
            updateTree();
            break;
        }

        case 'node_reasoning': {
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                n.reasoning[evt.step] = evt.summary;
                addLogReasoning(n.position, evt.step, evt.summary);
                if (selectedNodeId === evt.node_id) showDetailOverlay(evt.node_id);
            }
            break;
        }

        case 'node_thinking':
        case 'thinking_chunk': {
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                if (!n.thinking_chunks) n.thinking_chunks = [];
                const text = evt.text || evt.chunk || '';
                const turn = evt.turn || '';
                n.thinking_chunks.push({ text, turn });
                if (evt.chunk_index === 0 || n.thinking_chunks.length === 1) {
                    addLogThinking(n.position, text);
                }
                if (selectedNodeId === evt.node_id) showDetailOverlay(evt.node_id);
            }
            break;
        }

        case 'partition_gate': {
            const pos = evt.tree_position || '?';
            const verdict = evt.verdict || '?';
            const coverage = evt.completeness_pct != null ? evt.completeness_pct.toFixed(1) : '?';
            const msg = `⊞ Gate ${pos}: ${verdict} (${coverage}% coverage)`;
            addLog(msg, verdict === 'PASS' ? '#4CAF50' : '#F44336');
            break;
        }

        case 'worker_fetch': {
            const pos2 = evt.tree_position || '?';
            const count = evt.fetch_count || 0;
            addLog(`📥 Fetch ${pos2}: ${count} records requested`, '#2196F3');
            break;
        }

        case 'node_resolved': {
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                n.obs_count=evt.observations_count||0;
                n.cost=evt.cost||evt.cost_spent||0; n.top_observation=evt.top_observation||'';
                n.budget_spent=n.cost;
                if (evt.observations) n.observations = evt.observations;
                if (evt.self_evaluation) n.self_evaluation = evt.self_evaluation;
                // EQUIP resolution: check for READY vs CANNOT_PREP
                if (n.is_equip || (evt.tree_position === 'EQUIP') || (equipNodeId && evt.node_id === equipNodeId)) {
                    const topObs = (n.top_observation || '').toUpperCase();
                    if (topObs.includes('CANNOT_PREP')) {
                        equipStatus = 'failed';
                        n.status = 'equip-failed';
                        addLog('resolved', `[EQUIP] CANNOT_PREP — workspace preparation failed`);
                    } else {
                        equipStatus = 'ready';
                        n.status = 'equip-ready';
                        addLog('resolved', `[EQUIP] READY — workspace prepared. ${(n.top_observation||'').slice(0,80)}`);
                    }
                } else {
                    n.status='resolved';
                }
                totalObs += n.obs_count;
                document.getElementById('stat-obs').textContent = totalObs;
                if (!n.is_equip && n.obs_count > 0) {
                    addLog('resolved', `[${n.position}] Resolved: ${n.obs_count} observations. ${(n.top_observation||'').slice(0,80)}`);
                }
            }
            updateTree(); break;
        }

        case 'node_decomposing': {
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                n.status='decomposing'; n.obs_count=evt.observations_count||0;
                n.children_scopes=evt.children_scopes||[];
                // Worker becoming a manager mid-investigation
                n.was_promoted = true;
                totalObs += n.obs_count;
                document.getElementById('stat-obs').textContent = totalObs;
                addLog('decomposing', `[${n.position}] ${n.obs_count} obs. Delegating to ${evt.children_count} sub-investigations.`);
                // Show decomposition overlay near the node
                showDecompOverlay(evt.node_id, evt.children_scopes || [], evt.reasoning_summary || '');
            }
            updateTree(); break;
        }

        case 'node_status':
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                n.status = evt.status;
                updateTree();
            }
            break;

        // Reassessment event — worker deciding RESOLVE / INVESTIGATE_FURTHER / HIRE
        case 'reassessment': {
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                n.reassessment = {
                    decision: evt.decision || '',
                    reasoning: evt.reasoning || '',
                    mission_met: evt.mission_met || '',
                    what_changed: evt.what_changed || '',
                };
                n.formation_decision = evt.decision || '';
                if (evt.decision === 'HIRE' || evt.decision === 'INVESTIGATE_FURTHER') {
                    n.was_promoted = true;
                }
                if (selectedNodeId === evt.node_id) showDetailOverlay(evt.node_id);
                updateTree();
            }
            break;
        }

        // Turn 2 result — manager reviewing children
        case 'turn2_result': {
            if (nodes.has(evt.node_id)) {
                const n = nodes.get(evt.node_id);
                n.turn2 = evt;
                n.turn2_decision = evt.decision || evt.option_chosen || '';
                // Child classifications
                const reviews = evt.worker_reviews || evt.children_summary || [];
                for (const r of reviews) {
                    const childId = r.child_id || r.node_id || '';
                    const classification = r.classification || r.hire_class || '';
                    if (childId && classification) {
                        n.child_classifications[childId] = classification;
                        // Also store on child node
                        if (nodes.has(childId)) {
                            nodes.get(childId).turn2_classification = classification;
                        }
                    }
                }
                // Cascade analysis
                if (evt.cascade_analysis && evt.cascade_analysis.length) {
                    cascadeResults.set(evt.node_id, evt.cascade_analysis);
                }
                if (selectedNodeId === evt.node_id) showDetailOverlay(evt.node_id);
                updateTree();
            }
            break;
        }

        // Followup spawned — continuation from Turn 2
        case 'followup_spawned': {
            followupLinks.push({
                parent: evt.parent_node,
                child: evt.child_node,
                reason: evt.reason || '',
            });
            if (nodes.has(evt.child_node)) {
                const child = nodes.get(evt.child_node);
                child.is_followup = true;
                child.followup_reason = evt.reason || '';
            }
            updateTree();
            break;
        }

        case 'budget_update': {
            const pct = evt.percent_used||0;
            document.getElementById('budget-fill').style.width = pct+'%';
            document.getElementById('budget-fill').style.background = pct>80?'#ef6f6f':pct>50?'#efcf6f':'#8b7ff8';
            document.getElementById('budget-text').textContent = `$${(evt.total_spent||0).toFixed(2)} / $${((evt.total_spent||0)+(evt.total_remaining||0)).toFixed(2)} (${pct.toFixed(0)}%)`;
            break;
        }

        case 'finding_discovered':
            totalFindings++;
            document.getElementById('stat-findings').textContent = totalFindings;
            addLog('finding', `[DISCOVERY] ${(evt.summary||'').slice(0,100)}`);
            break;

        case 'validation_result':
            addLog('validation', `[${(evt.verdict||'').toUpperCase()}] ${(evt.finding_summary||'').slice(0,80)}`);
            break;

        case 'significance_scored': {
            const tier = evt.tier||'noted';
            if (tier==='headline') headlineFindings.push(evt);
            else if (tier==='significant') significantFindings.push(evt);
            const body = document.getElementById('log-body');
            const el = document.createElement('div');
            el.className = `log-finding ${tier}`;
            el.innerHTML = `<div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:${tier==='headline'?'#e0b840':tier==='significant'?'#8b7ff8':'#555'}">${tier} (${evt.composite||0})</div><div style="margin-top:3px;color:#c0c0d4">${(evt.finding_summary||'').slice(0,140)}</div>`;
            body.appendChild(el);
            body.scrollTop = body.scrollHeight;
            break;
        }

        case 'impact_result':
            addLog('impact', `[IMPACT: ${evt.urgency}] ${(evt.finding_summary||'').slice(0,80)}`);
            break;

        // Knowledge graph updates
        case 'kg_update': {
            kgEntities = evt.entities || kgEntities;
            kgRelations = evt.relations || kgRelations;
            document.getElementById('kg-entities').textContent = kgEntities;
            document.getElementById('kg-relations').textContent = kgRelations;
            document.getElementById('kg-count').textContent = kgEntities;
            // Update graph data if entity/relationship details provided
            if (evt.entity_data) {
                for (const e of evt.entity_data) {
                    if (!kgNodes.find(n => n.id === e.name)) {
                        kgNodes.push({ id: e.name, name: e.name, type: e.entity_type || 'unknown', observation_count: e.observation_count || 1 });
                    } else {
                        const existing = kgNodes.find(n => n.id === e.name);
                        existing.observation_count = e.observation_count || existing.observation_count;
                    }
                }
            }
            if (evt.relationship_data) {
                for (const r of evt.relationship_data) {
                    if (!kgEdges.find(e => e.source === r.from_name && e.target === r.to_name && e.relationship_type === r.relationship_type)) {
                        kgEdges.push({ source: r.from_name, target: r.to_name, relationship_type: r.relationship_type || '' });
                    }
                }
            }
            updateKgGraph();
            break;
        }

        // Bulletin board updates
        case 'bb_post': {
            bbPosts += evt.post_count || 1;
            document.getElementById('bb-posts-label').textContent = `${bbPosts} posts`;
            document.getElementById('bb-count').textContent = bbPosts;
            // Store post details if available
            if (evt.posts) {
                for (const p of evt.posts) {
                    if (p.post_type === 'EQUIP_BRIEFING') equipBriefingContent = p.content || '';
                    bbPostsList.push(p);
                    renderBbPost(p);
                }
            } else {
                // Minimal event — create a placeholder card
                const placeholder = {
                    post_id: evt.post_id || `p-${bbPosts}`,
                    author_node_id: evt.node_id || '',
                    author_role_name: evt.role_name || '',
                    post_type: evt.post_type || 'OBSERVATION',
                    content: evt.content || `Post from ${evt.node_id || 'unknown'}`,
                    timestamp: evt.timestamp || Date.now()/1000,
                    references: evt.references || [],
                };
                if (placeholder.post_type === 'EQUIP_BRIEFING') equipBriefingContent = placeholder.content || '';
                bbPostsList.push(placeholder);
                renderBbPost(placeholder);
            }
            break;
        }

        // Bulletin board pull event
        case 'bb_pull': {
            const pull = {
                pull_id: evt.pull_id || '',
                pulling_node_id: evt.pulling_node_id || evt.node_id || '',
                post_id: evt.post_id || '',
                influence: evt.influence || false,
            };
            bbPullsList.push(pull);
            renderBbPull(pull);
            // If influence, draw lateral edge in tree
            if (pull.influence) {
                const post = bbPostsList.find(p => p.post_id === pull.post_id);
                if (post && post.author_node_id && pull.pulling_node_id) {
                    lateralEdges.push({ source_node_id: post.author_node_id, target_node_id: pull.pulling_node_id });
                    updateTree();
                }
            }
            break;
        }

        case 'exploration_complete':
            document.getElementById('source-info').textContent = `Complete: ${evt.total_nodes} nodes, ${evt.total_observations} obs, $${(evt.total_cost||0).toFixed(2)}, ${formatTime((evt.elapsed_seconds||0)*1000)}`;
            finalizeAll();
            break;

        case 'deliverable_db_created': {
            const ent = evt.entities || 0;
            const obs3 = evt.observations || 0;
            const findings = evt.findings || 0;
            const vectors = evt.vectors || 0;
            addLog(`📦 Deliverable: ${ent} entities, ${obs3} obs, ${findings} findings, ${vectors} vectors`, '#9C27B0');
            break;
        }

        case 'obsidian_vault_created':
            addLog(`📝 Obsidian vault: ${evt.file_count || 0} files`, '#9C27B0');
            break;

        case 'deliverable_error':
            addLog(`⚠ Deliverable error: ${evt.error || '?'}`, '#F44336');
            break;
    }

    // Update depth
    nodes.forEach(n => { const d=(n.position||'').split('.').length; if(d>maxDepth)maxDepth=d; });
    document.getElementById('stat-depth').textContent = maxDepth;
}

// === LOGGING ===
function addLog(type, text) {
    const body = document.getElementById('log-body');
    const el = document.createElement('div');
    el.className = `log-entry ${type}`;
    el.textContent = text;
    body.appendChild(el);
    body.scrollTop = body.scrollHeight;
    while(body.children.length > 400) body.removeChild(body.firstChild);
}

function addLogBlock(type, label, lines) {
    const body = document.getElementById('log-body');
    const el = document.createElement('div');
    el.className = `log-entry ${type}`;
    el.style.padding = '8px 0';
    const color = type==='genesis'?'#b0a0e0':type==='planner'?'#80c0a0':'#9898b0';
    el.innerHTML = `<div style="font-size:10px;letter-spacing:1px;color:${color};font-weight:bold;margin-bottom:6px">${label}</div><div style="color:#c0c0d4;line-height:1.6;font-size:11px">${lines.map(l=>{
        // Indent lines that start with spaces (sub-items)
        if (l.trim().startsWith('-') || l.trim().startsWith('•')) return '<div style="margin:2px 0;padding-left:8px;color:#9898b0">'+l+'</div>';
        if (l.trim().match(/^\s/)) return '<div style="margin:2px 0;padding-left:12px;color:#8888a0;font-size:10px">'+l.trim()+'</div>';
        return '<div style="margin:4px 0">'+l+'</div>';
    }).join('')}</div>`;
    body.appendChild(el);
    body.scrollTop = body.scrollHeight;
}

// === PHASE BAR ===
function updatePhaseBar(phase) {
    let found=false;
    document.querySelectorAll('.phase-step').forEach(s => {
        if(s.dataset.phase===phase){s.className='phase-step active';found=true;}
        else if(!found){s.className='phase-step done';}
        else{s.className='phase-step';}
    });

// === TREE ===
function shortLabel(scope, depth) {
    if(!scope) return '';
    // Only show labels for depth 0-1. Deeper nodes show on hover only.
    if (depth > 1) return '';
    // Extract first 2-3 meaningful words as the label
    const words = scope.replace(/[^a-zA-Z0-9@/ -]/g,' ').trim().split(/\s+/).filter(w => w.length > 1);
    // Skip filler words
    const skip = new Set(['the','and','of','in','for','to','a','an','with','from','by','that','this','its','are','is']);
    const meaningful = words.filter(w => !skip.has(w.toLowerCase()));
    const label = meaningful.slice(0, 3).join(' ');
    return label.length > 18 ? label.slice(0, 16) + '..' : label;
}
function nodeRadius(d) { return (d.id==='__genesis__')?4:(d.id==='__equip__')?4:(d.id==='__root__')?3:5+Math.min(8,(d.obs_count||0)*0.7); }
function countLeaves(n) { return (!n.children||!n.children.length)?1:n.children.reduce((s,c)=>s+countLeaves(c),0); }

// Classification color for Turn 2 child rings
function classifyColor(classification) {
    if (!classification) return null;
    const c = classification.toUpperCase();
    if (c.includes('MET')) return '#5cb85c';
    if (c.includes('EXHAUSTED')) return '#6a9ad0';
    if (c.includes('POOR')) return '#ef6f6f';
    return null;
}

function buildHierarchy(id) {
    const n=nodes.get(id); if(!n)return null;
    const ch=Array.from(nodes.values()).filter(c=>c.parent_id===id).map(c=>buildHierarchy(c.id)).filter(Boolean);
    return {
        id:n.id, position:n.position, status:n.status, obs_count:n.obs_count,
        scope:n.scope, segment:n.segment, was_promoted:n.was_promoted,
        is_followup:n.is_followup, turn2_classification:n.turn2_classification,
        formation_decision:n.formation_decision||'',
        children:ch.length?ch:undefined,
    };
}

// Wrap the real tree root under a synthetic genesis node with EQUIP node
function wrapWithGenesis(realRoot) {
    let equip;
    if (equipNodeId && nodes.has(equipNodeId)) {
        const en = nodes.get(equipNodeId);
        equip = {
            id:'__equip__', position:'EQUIP', status:en.status, obs_count:en.obs_count,
            scope:'EQUIP', segment:'', was_promoted:false,
            is_followup:false, turn2_classification:null, formation_decision:'',
            is_equip:true, real_node_id:equipNodeId,
        };
    } else {
        equip = {
            id:'__equip__', position:'', status:'idle', obs_count:0,
            scope:'EQUIP', segment:'', was_promoted:false,
            is_followup:false, turn2_classification:null, formation_decision:'',
        };
    }
    return {
        id:'__genesis__', position:'', status:'genesis-root', obs_count:0,
        scope:'Genesis', segment:'', was_promoted:false,
        is_followup:false, turn2_classification:null, formation_decision:'',
        children: [realRoot, equip],
    };
}

function updateTree() {
    const arr=Array.from(nodes.values()); if(!arr.length)return;
    const roots=arr.filter(n=>!n.parent_id||!nodes.has(n.parent_id)); if(!roots.length)return;
    let realRoot=roots.length===1?buildHierarchy(roots[0].id):{id:'__root__',status:'idle',obs_count:0,scope:'Root',position:'',formation_decision:'',children:roots.map(r=>buildHierarchy(r.id))};
    // Wrap under genesis
    let root = wrapWithGenesis(realRoot);
    const leaves=countLeaves(root);
    const tl=d3.tree().nodeSize([Math.max(20,Math.min(42,380/Math.max(1,leaves))),85]);
    const hier=d3.hierarchy(root); tl(hier);

    // --- Standard tree links ---
    const links=linkGroup.selectAll('.link').data(hier.links(),d=>`${d.source.data.id}-${d.target.data.id}`);
    const linksEnter = links.enter().append('path').attr('class','link').attr('opacity',0)
        .on('mouseover', function(e, d) {
            const parentId = d.source.data.id;
            const childId = d.target.data.id;
            const allocs = budgetAllocations.get(parentId);
            if (allocs) {
                const alloc = allocs.find(a => a.child_id === childId);
                if (alloc) {
                    const t = document.getElementById('tooltip');
                    t.style.display = 'block';
                    t.innerHTML = `<div style="color:#8b7ff8">Budget allocation</div><div style="margin-top:4px">$${alloc.amount.toFixed(3)}</div>`;
                    moveTooltip(e);
                }
            }
        })
        .on('mousemove', moveTooltip)
        .on('mouseout', hideTooltip);
    linksEnter.merge(links).transition().duration(300).attr('opacity',1).attr('d',d3.linkVertical().x(d=>d.x).y(d=>d.y));
    links.exit().transition().duration(200).attr('opacity',0).remove();

    // --- Edge thickness for budget allocations ---
    linkGroup.selectAll('.link').each(function(d) {
        const parentId = d.source.data.id;
        const childId = d.target.data.id;
        const allocs = budgetAllocations.get(parentId);
        if (allocs) {
            const alloc = allocs.find(a => a.child_id === childId);
            if (alloc) {
                const thickness = Math.max(1.5, Math.min(5, alloc.amount * 4));
                d3.select(this).style('stroke-width', thickness + 'px');
            }
        }
    });

    // --- Lateral edges (bulletin board influence) ---
    const lateralData = lateralEdges.map(le => {
        const sourceD = hier.descendants().find(d => d.data.id === le.source_node_id);
        const targetD = hier.descendants().find(d => d.data.id === le.target_node_id);
        return sourceD && targetD ? { source: sourceD, target: targetD, key: `lat-${le.source_node_id}-${le.target_node_id}` } : null;
    }).filter(Boolean);
    const lats = linkGroup.selectAll('.lateral-edge').data(lateralData, d => d.key);
    lats.enter().append('path').attr('class','lateral-edge').merge(lats)
        .attr('d', d => {
            const sx=d.source.x, sy=d.source.y, tx=d.target.x, ty=d.target.y;
            const midY = Math.min(sy, ty) - 20;
            return `M${sx},${sy} C${sx},${midY} ${tx},${midY} ${tx},${ty}`;
        });
    lats.exit().remove();

    // --- Cascade reference lines ---
    const cascadeLineData = [];
    cascadeResults.forEach((analyses, parentId) => {
        for (const ca of analyses) {
            if (ca.classification && ca.hires_involved && ca.hires_involved.length >= 2) {
                // Find child nodes by role name match
                const childNodes = hier.descendants().filter(d => {
                    const n = nodes.get(d.data.id);
                    return n && ca.hires_involved.some(h => n.role_name && n.role_name.includes(h));
                });
                for (let i = 0; i < childNodes.length - 1; i++) {
                    cascadeLineData.push({
                        source: childNodes[i], target: childNodes[i+1],
                        classification: ca.classification,
                        key: `cascade-${childNodes[i].data.id}-${childNodes[i+1].data.id}`,
                    });
                }
            }
        }
    });
    const cascLines = linkGroup.selectAll('.cascade-line').data(cascadeLineData, d => d.key);
    cascLines.enter().append('path').attr('class', d => `cascade-line ${(d.classification||'').toLowerCase()}`)
        .merge(cascLines)
        .attr('d', d => {
            const sx=d.source.x, sy=d.source.y, tx=d.target.x, ty=d.target.y;
            const midY = Math.max(sy, ty) + 15;
            return `M${sx},${sy} C${sx},${midY} ${tx},${midY} ${tx},${ty}`;
        });
    cascLines.exit().remove();

    // --- Nodes ---
    const ns=nodeGroup.selectAll('.node').data(hier.descendants(),d=>d.data.id);
    const enter=ns.enter().append('g').attr('transform',d=>`translate(${d.x},${d.y})`).attr('opacity',0)
        .on('click',(e,d)=>{
            e.stopPropagation();
            if(d.data.id==='__genesis__')return;
            if(d.data.id==='__equip__') { if(equipNodeId) showEquipDetail(); return; }
            toggleDetail(d.data.id);
        })
        .on('mouseover',(e,d)=>{if(d.data.id==='__genesis__')showTooltipSimple(e,'Genesis');else if(d.data.id==='__equip__')showEquipTooltip(e);else showTooltip(e,d.data);})
        .on('mousemove',moveTooltip).on('mouseout',hideTooltip);
    enter.append('circle').attr('r',d=>nodeRadius(d.data));
    // Outer ring for Turn 2 classification
    enter.append('circle').attr('class','classify-ring').attr('r',d=>nodeRadius(d.data)+3);
    // Promoted badge (M for manager)
    enter.append('text').attr('class','promoted-badge').attr('dy',-nodeRadius(root)+1).attr('dx',nodeRadius(root)+2);
    // Decision marker (formation choice)
    enter.append('text').attr('class','decision-marker');
    // Cascade badge
    enter.append('text').attr('class','cascade-badge');
    enter.append('text').attr('class','label')
        .attr('dy', d => {
            if (d.data.id === '__genesis__') return nodeRadius(d.data) + 12;
            if (d.data.id === '__equip__') return nodeRadius(d.data) + 12;
            if (d.depth > 2) return nodeRadius(d.data) + 11;
            // Stagger depth 1-2 labels (shifted by 1 due to genesis wrapper)
            const idx = d.parent ? d.parent.children.indexOf(d) : 0;
            return idx % 2 === 0 ? nodeRadius(d.data) + 13 : -(nodeRadius(d.data) + 5);
        })
        .text(d => {
            if (d.data.id === '__genesis__') return 'GENESIS';
            if (d.data.id === '__equip__') return 'EQUIP';
            // depth shifted +1 due to genesis wrapper
            return shortLabel(d.data.scope, d.depth - 1);
        });
    enter.append('text').attr('class','obs-badge').text(d=>d.data.obs_count>0?d.data.obs_count:'');

    const merged=ns.merge(enter);
    merged.transition().duration(300).attr('opacity',1).attr('transform',d=>`translate(${d.x},${d.y})`);
    merged.attr('class',d=>{
        if(d.data.id==='__genesis__') return 'node genesis-root';
        if(d.data.id==='__equip__') {
            if (equipStatus === 'preparing') return 'node equip-preparing';
            if (equipStatus === 'ready') return 'node equip-ready';
            if (equipStatus === 'failed') return 'node equip-failed';
            return 'node equip-placeholder';
        }
        return `node ${d.data.status}${d.data.id===selectedNodeId?' selected':''}`;
    });
    merged.select('circle:first-child').transition().duration(250).attr('r',d=>nodeRadius(d.data));
    // Classification ring
    merged.select('.classify-ring').attr('r',d=>nodeRadius(d.data)+3)
        .attr('stroke',d=>classifyColor(d.data.turn2_classification)||'none')
        .attr('stroke-width',d=>classifyColor(d.data.turn2_classification)?2:0);
    // Promoted badge
    merged.select('.promoted-badge')
        .text(d=>d.data.was_promoted?'M':d.data.is_followup?'C':'')
        .attr('dy',d=>-(nodeRadius(d.data)+2))
        .attr('dx',d=>nodeRadius(d.data)+1);
    // Decision marker (reassessment choice)
    merged.select('.decision-marker')
        .text(d => {
            const dec = (d.data.formation_decision || '').toUpperCase();
            if (dec === 'HIRE') return 'H';
            if (dec === 'RESOLVE') return 'R';
            if (dec === 'INVESTIGATE_FURTHER') return 'I';
            return '';
        })
        .attr('class', d => {
            const dec = (d.data.formation_decision || '').toUpperCase();
            let cls = 'decision-marker';
            if (dec === 'HIRE') cls += ' hire';
            else if (dec === 'RESOLVE') cls += ' resolve';
            else if (dec === 'INVESTIGATE_FURTHER') cls += ' investigate';
            return cls;
        })
        .attr('dy', d => nodeRadius(d.data) + 2)
        .attr('dx', d => -(nodeRadius(d.data) + 4));
    // Cascade badge on parent nodes
    merged.select('.cascade-badge')
        .text(d => {
            const cas = cascadeResults.get(d.data.id);
            if (!cas || !cas.length) return '';
            const hasCascade = cas.some(c => (c.classification||'').toUpperCase() === 'CASCADE');
            return hasCascade ? 'C' : '';
        })
        .attr('class', d => {
            const cas = cascadeResults.get(d.data.id);
            if (!cas || !cas.length) return 'cascade-badge';
            const hasCascade = cas.some(c => (c.classification||'').toUpperCase() === 'CASCADE');
            return hasCascade ? 'cascade-badge cascade' : 'cascade-badge independent';
        })
        .attr('dy', d => -(nodeRadius(d.data) + 2))
        .attr('dx', d => -(nodeRadius(d.data) + 4));
    merged.select('.label').text(d => {
        if (d.data.id === '__genesis__') return 'GENESIS';
        if (d.data.id === '__equip__') return 'EQUIP';
        return shortLabel(d.data.scope, d.depth - 1);
    });
    merged.select('.obs-badge').text(d=>d.data.obs_count>0?d.data.obs_count:'');
    ns.exit().transition().duration(200).attr('opacity',0).remove();

    // Store node positions for decomp overlay and budget animation
    hier.descendants().forEach(d => {
        if (nodes.has(d.data.id)) {
            nodes.get(d.data.id)._treeX = d.x;
            nodes.get(d.data.id)._treeY = d.y;
        }
    });
}

// Click empty space to close detail
svg.on('click', () => closeDetailOverlay());

// === DETAIL OVERLAY (rich per-node panel) ===
function toggleDetail(nodeId) {
    if (selectedNodeId === nodeId) { closeDetailOverlay(); return; }
    selectedNodeId = nodeId;
    showDetailOverlay(nodeId);
    updateTree();
}

function showDetailOverlay(nodeId) {
    const n = nodes.get(nodeId); if(!n) return;
    selectedNodeId = nodeId;
    const colors={exploring:'#4a7ab0',resolved:'#3da06e',decomposing:'#5a9a5a',synthesizing:'#7b5fc0',idle:'#555',reviewing:'#d0901d',delegating:'#5a9a5a',waiting_for_children:'#5a9a5a',complete:'#3da06e'};

    let html = `<button class="detail-close" onclick="closeDetailOverlay()">&times;</button>`;

    // Title: position + role name
    html += `<div class="detail-title">[${n.position||'ROOT'}]${n.role_name?' '+n.role_name:''}</div>`;

    // Scope description
    html += `<div class="detail-scope">${n.scope||'Root'}</div>`;

    // Badges row
    html += `<div style="margin-bottom:10px">`;
    if (n.was_promoted) html += `<span class="detail-badge manager">Manager</span>`;
    else if (n.status === 'resolved' && !n.was_promoted) html += `<span class="detail-badge worker">Worker</span>`;
    if (n.is_followup) html += `<span class="detail-badge reviewing">Continuation</span>`;
    if (n.scope_level && n.scope_level !== 'ambiguous') html += `<span class="detail-badge" style="background:#14141e;color:#8888a0;border:1px solid #2a2a3e">${n.scope_level}</span>`;
    html += `</div>`;

    // Meta line: status, cost, obs count
    html += `<div class="detail-meta">
        <span class="dot" style="background:${colors[n.status]||'#555'}"></span>${n.status}
        | $${(n.cost||0).toFixed(3)}
        | ${n.obs_count} obs
        ${n.segment?` | seg: ${n.segment}`:''}
    </div>`;

    // Mission and bar (if available)
    if (n.mission) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Mission</div>
            <div style="font-size:11px;color:#b0b0c4;line-height:1.5">${n.mission}</div>
        </div>`;
    }
    if (n.bar) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Bar (minimum acceptable)</div>
            <div style="font-size:11px;color:#a08080;line-height:1.5">${n.bar}</div>
        </div>`;
    }

    // Budget
    if (n.budget_allocated > 0) {
        const pct = n.budget_allocated > 0 ? ((n.cost || 0) / n.budget_allocated * 100).toFixed(0) : 0;
        html += `<div class="detail-section">
            <div class="detail-section-label">Budget</div>
            <div style="font-size:11px;color:#b0b0c4">
                $${(n.cost||0).toFixed(3)} / $${n.budget_allocated.toFixed(3)} (${pct}%)
            </div>
            <div style="height:4px;background:#1a1a2e;border-radius:2px;margin-top:4px;overflow:hidden">
                <div style="height:100%;width:${Math.min(100,pct)}%;background:${pct>80?'#ef6f6f':'#8b7ff8'}"></div>
            </div>
        </div>`;
    }

    // Continuation link back to parent
    if (n.is_followup && n.parent_id) {
        const parent = nodes.get(n.parent_id);
        html += `<div class="detail-section">
            <div class="detail-section-label">Continuation of</div>
            <div style="font-size:11px;color:#9b7fe0;cursor:pointer;text-decoration:underline"
                 onclick="toggleDetail('${n.parent_id}')">
                [${parent?parent.position:'?'}] ${parent?parent.scope.slice(0,60):'parent node'}
            </div>
            ${n.followup_reason?`<div style="font-size:10px;color:#8888a0;margin-top:4px">${n.followup_reason}</div>`:''}
        </div>`;
    }

    html += `<hr style="border-color:#1e1e30;margin:12px 0">`;

    // Reassessment decision (worker mid-investigation)
    if (n.reassessment) {
        const dec = n.reassessment.decision || '';
        const decClass = dec === 'RESOLVE' ? 'resolve' : dec === 'HIRE' ? 'hire' : 'investigate';
        html += `<div class="detail-section">
            <div class="detail-section-label">Reassessment</div>
            <div class="reassessment-box">
                <div class="reassessment-decision ${decClass}">${dec}</div>
                ${n.reassessment.reasoning?`<div style="margin-top:6px;color:#b0b0c4;font-size:11px">${n.reassessment.reasoning.slice(0,200)}</div>`:''}
                ${n.reassessment.what_changed?`<div style="margin-top:4px;color:#8888a0;font-size:10px">Changed: ${n.reassessment.what_changed.slice(0,150)}</div>`:''}
            </div>
        </div>`;
    }

    // Thinking (genuine chain-of-thought)
    if (n.thinking_chunks && n.thinking_chunks.length) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Thinking</div>`;
        // Group by turn if available
        const byTurn = {};
        for (const chunk of n.thinking_chunks) {
            const turn = chunk.turn || 'initial';
            if (!byTurn[turn]) byTurn[turn] = [];
            byTurn[turn].push(chunk.text);
        }
        for (const [turn, texts] of Object.entries(byTurn)) {
            if (Object.keys(byTurn).length > 1) {
                html += `<div style="font-size:9px;color:#6a6a80;margin:6px 0 2px;text-transform:uppercase">${turn}</div>`;
            }
            for (const text of texts) {
                html += `<div style="margin:4px 0;padding:8px 12px;border-left:2px solid #333;font-size:11px;line-height:1.5;color:#b0b0c4;font-style:italic">"${text}"</div>`;
            }
        }
        html += `</div>`;
    }
    // Fallback: old reasoning steps format
    else if (Object.keys(n.reasoning).length) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Reasoning</div>`;
        for (const step of ['survey','orient','hypothesize','assess']) {
            if (n.reasoning[step]) {
                html += `<div class="reasoning-step ${step}"><div class="step-label">${step}</div>"${n.reasoning[step]}"</div>`;
            }
        }
        html += `</div>`;
    }
    else if (n.status==='exploring') {
        html += `<div style="color:#555;font-size:12px;margin:14px 0">Reasoning in progress...</div>`;
    }

    // Observations
    if (n.obs_count > 0) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Observations (${n.obs_count})</div>`;
        if (n.observations && n.observations.length) {
            for (let i = 0; i < Math.min(n.observations.length, 10); i++) {
                const obs = n.observations[i];
                const summary = obs.raw_evidence || obs.local_hypothesis || 'Observation ' + (i+1);
                html += `<div class="obs-item" onclick="this.classList.toggle('expanded')">
                    <div class="obs-item-summary">${summary.slice(0,120)}</div>
                    <div class="obs-item-detail">
                        ${obs.local_hypothesis?`<div><b>Hypothesis:</b> ${obs.local_hypothesis.slice(0,200)}</div>`:''}
                        ${obs.statistical_grounding?`<div><b>Grounding:</b> ${obs.statistical_grounding.slice(0,200)}</div>`:''}
                        ${obs.confidence?`<div><b>Confidence:</b> ${obs.confidence}</div>`:''}
                    </div>
                </div>`;
            }
            if (n.observations.length > 10) {
                html += `<div style="font-size:10px;color:#6a6a80;margin-top:6px">+ ${n.observations.length - 10} more</div>`;
            }
        } else if (n.top_observation) {
            html += `<div class="detail-finding"><div class="detail-finding-label">Top Finding</div>${n.top_observation}</div>`;
        }
        html += `</div>`;
    } else if (n.top_observation) {
        html += `<div class="detail-finding"><div class="detail-finding-label">Top Finding</div>${n.top_observation}</div>`;
    }

    // Self-evaluation
    if (n.self_evaluation) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Self-Evaluation</div>
            <div style="font-size:11px;color:#b0b0c4;line-height:1.6;padding:8px 12px;background:#12121e;border-radius:4px">`;
        if (typeof n.self_evaluation === 'object') {
            for (const [k, v] of Object.entries(n.self_evaluation)) {
                if (v && typeof v !== 'object') {
                    html += `<div><span style="color:#8888a0">${k}:</span> ${String(v).slice(0,100)}</div>`;
                }
            }
        } else {
            html += String(n.self_evaluation).slice(0, 300);
        }
        html += `</div></div>`;
    }

    // Turn 2 review (for managers)
    if (n.turn2) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Turn 2 Review</div>`;

        // Decision
        if (n.turn2_decision) {
            const dec = n.turn2_decision.toUpperCase();
            const decColor = dec.includes('E') || dec === 'RESOLVE' ? '#5cb85c' : '#d0901d';
            html += `<div style="font-size:12px;font-weight:bold;color:${decColor};margin-bottom:8px">
                Decision: ${dec}${n.turn2.option_reasoning?` — ${n.turn2.option_reasoning.slice(0,80)}`:''}
            </div>`;
        }

        // Child classifications
        const reviews = n.turn2.worker_reviews || n.turn2.children_summary || [];
        if (reviews.length) {
            html += `<div style="margin-top:8px">`;
            for (const r of reviews) {
                const cls = (r.classification || r.hire_class || '').toUpperCase();
                let badgeClass = 'met';
                if (cls.includes('EXHAUSTED')) badgeClass = 'exhausted';
                else if (cls.includes('POOR')) badgeClass = 'poor';
                html += `<div class="child-review">
                    <span class="classify-badge ${badgeClass}">${cls || 'unclassified'}</span>
                    <span style="color:#b0b0c4;margin-left:6px">${(r.worker_scope || r.scope || '').slice(0,60)}</span>
                    ${r.assessment?`<div style="font-size:10px;color:#8888a0;margin-top:3px">${r.assessment.slice(0,100)}</div>`:''}
                </div>`;
            }
            html += `</div>`;
        }

        // Synthesis findings
        if (n.turn2.synthesis) {
            const syn = n.turn2.synthesis;
            if (syn.patterns && syn.patterns.length) {
                html += `<div style="margin-top:8px"><div style="font-size:9px;color:#6a6a80;text-transform:uppercase;margin-bottom:4px">Cross-cutting patterns</div>`;
                for (const p of syn.patterns.slice(0,3)) {
                    html += `<div style="font-size:10px;color:#b0b0c4;padding:2px 0">- ${p.slice(0,100)}</div>`;
                }
                html += `</div>`;
            }
        }
        html += `</div>`;
    }

    // Cascade analysis
    const cascades = cascadeResults.get(nodeId);
    if (cascades && cascades.length) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Cascade Analysis</div>`;
        for (const ca of cascades) {
            const cls = (ca.classification || '').toUpperCase();
            const color = cls === 'CASCADE' ? '#d0901d' : '#5cb85c';
            html += `<div style="margin:6px 0;padding:8px 12px;background:#12121e;border-radius:4px;border-left:3px solid ${color}">
                <div style="font-size:10px;font-weight:bold;color:${color}">${cls}</div>
                ${ca.overlap ? `<div style="font-size:10px;color:#b0b0c4;margin-top:3px">${ca.overlap.slice(0,120)}</div>` : ''}
                ${ca.hires_involved ? `<div style="font-size:9px;color:#6a6a80;margin-top:2px">Hires: ${ca.hires_involved.join(', ')}</div>` : ''}
                ${ca.reasoning ? `<div style="font-size:9px;color:#8888a0;margin-top:2px">${ca.reasoning.slice(0,150)}</div>` : ''}
            </div>`;
        }
        html += `</div>`;
    }

    // Children scopes
    if (n.children_scopes && n.children_scopes.length) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Delegated to (${n.children_scopes.length})</div>`;
        for (const s of n.children_scopes) html += `<div style="padding:3px 0;font-size:11px;color:#9090a4">- ${s}</div>`;
        html += `</div>`;
    }

    // Followup children (from Turn 2)
    const myFollowups = followupLinks.filter(f => f.parent === nodeId);
    if (myFollowups.length) {
        html += `<div class="detail-section">
            <div class="detail-section-label">Continuations (${myFollowups.length})</div>`;
        for (const f of myFollowups) {
            const child = nodes.get(f.child);
            html += `<div style="padding:3px 0;font-size:11px;color:#9b7fe0;cursor:pointer;text-decoration:underline"
                         onclick="toggleDetail('${f.child}')">
                [${child?child.position:'?'}] ${child?child.scope.slice(0,60):'followup'}
            </div>`;
            if (f.reason) html += `<div style="font-size:10px;color:#8888a0;padding-left:8px">${f.reason.slice(0,80)}</div>`;
        }
        html += `</div>`;
    }

    document.getElementById('detail-overlay').innerHTML = html;
    document.getElementById('detail-overlay').classList.add('active');
    document.getElementById('detail-backdrop').classList.add('active');
    updateTree();
}
