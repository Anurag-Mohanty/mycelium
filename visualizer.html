// Load workspace_state.json for playback
async function loadWorkspaceState(eventsUrl) {
    // Try to load workspace_state.json from same directory as events file
    try {
        const dir = eventsUrl.substring(0, eventsUrl.lastIndexOf('/'));
        const resp = await fetch(`${dir}/workspace_state.json`);
        if (resp.ok) {
            const data = await resp.json();
            if (data.posts) {
                for (const p of data.posts) {
                    if (p.post_type === 'EQUIP_BRIEFING') equipBriefingContent = p.content || '';
                    bbPostsList.push(p);
                    renderBbPost(p);
                }
                bbPosts = data.posts.length;
                document.getElementById('bb-posts-label').textContent = `${bbPosts} posts`;
                document.getElementById('bb-count').textContent = bbPosts;
            }
            if (data.pulls) {
                for (const pull of data.pulls) {
                    bbPullsList.push(pull);
                    renderBbPull(pull);
                    if (pull.influence) {
                        const post = bbPostsList.find(p => p.post_id === pull.post_id);
                        if (post && post.author_node_id && pull.pulling_node_id) {
                            lateralEdges.push({ source_node_id: post.author_node_id, target_node_id: pull.pulling_node_id });
                        }
                    }
                }
            }
        }
    } catch(e) { /* workspace_state.json not available — that's fine */ }
}

// Load knowledge_graph.json for playback
async function loadKnowledgeGraph(eventsUrl) {
    try {
        const dir = eventsUrl.substring(0, eventsUrl.lastIndexOf('/'));
        const resp = await fetch(`${dir}/knowledge_graph.json`);
        if (resp.ok) {
            const data = await resp.json();
            if (data.entities) {
                for (const e of data.entities) {
                    kgNodes.push({
                        id: e.name, name: e.name,
                        type: e.entity_type || 'unknown',
                        observation_count: e.observation_count || 1,
                        first_observed_run: e.first_observed_run || '',
                        last_observed_run: e.last_observed_run || '',
                    });
                }
                kgEntities = kgNodes.length;
                document.getElementById('kg-entities').textContent = kgEntities;
                document.getElementById('kg-count').textContent = kgEntities;
            }
            if (data.relationships) {
                for (const r of data.relationships) {
                    kgEdges.push({
                        source: r.from_name, target: r.to_name,
                        relationship_type: r.relationship_type || '',
                    });
                }
                kgRelations = kgEdges.length;
                document.getElementById('kg-relations').textContent = kgRelations;
            }
            updateKgGraph();
        }
    } catch(e) { /* knowledge_graph.json not available */ }
}

// === KNOWLEDGE GRAPH FORCE-DIRECTED VISUALIZATION ===
const kgEntityColors = {
    package: '#4a7ab0', maintainer: '#3da06e', finding: '#d0901d',
    organization: '#9b7fe0', vulnerability: '#ef6f6f', ecosystem: '#5cb85c',
    company: '#6a9ad0', filing: '#d0a040', person: '#3da06e',
    unknown: '#4a4a60',
};
function kgColor(type) {
    const t = (type || 'unknown').toLowerCase();
    for (const [key, color] of Object.entries(kgEntityColors)) {
        if (t.includes(key)) return color;
    }
    return kgEntityColors.unknown;
}

function updateKgGraph() {
    if (!kgNodes.length) return;
    const svgEl = document.getElementById('kg-graph-svg');
    const width = svgEl.clientWidth || 340;
    const height = svgEl.clientHeight || 340;
    const kgSvg = d3.select('#kg-graph-svg');

    // Filter edges to only those with existing nodes
    const nodeIds = new Set(kgNodes.map(n => n.id));
    const validEdges = kgEdges.filter(e => nodeIds.has(e.source) || nodeIds.has(e.source.id || e.source))
        .filter(e => nodeIds.has(e.target) || nodeIds.has(e.target.id || e.target));

    // Restart simulation
    if (kgSimulation) kgSimulation.stop();

    kgSimulation = d3.forceSimulation(kgNodes)
        .force('link', d3.forceLink(validEdges).id(d => d.id).distance(60))
        .force('charge', d3.forceManyBody().strength(-80))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(12));

    kgSvg.selectAll('*').remove();
    const kgG = kgSvg.append('g');

    // Zoom for KG
    kgSvg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => kgG.attr('transform', e.transform)));

    // Edges
    const link = kgG.selectAll('.kg-edge-line').data(validEdges)
        .enter().append('line').attr('class', 'kg-edge-line');

    // Edge labels
    const edgeLabel = kgG.selectAll('.kg-edge-label').data(validEdges)
        .enter().append('text').attr('class', 'kg-edge-label')
        .text(d => (d.relationship_type || '').slice(0, 15));

    // Nodes
    const node = kgG.selectAll('.kg-node-g').data(kgNodes)
        .enter().append('g').attr('class', 'kg-node-g')
        .call(d3.drag()
            .on('start', (e, d) => { if (!e.active) kgSimulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on('end', (e, d) => { if (!e.active) kgSimulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

    node.append('circle').attr('class', 'kg-node-circle')
        .attr('r', d => Math.max(4, Math.min(12, 3 + (d.observation_count || 1) * 1.5)))
        .attr('fill', d => kgColor(d.type))
        .attr('stroke', d => kgColor(d.type)).attr('stroke-width', 1).attr('fill-opacity', 0.7)
        .on('click', (e, d) => showKgProvenance(e, d));

    node.append('text').attr('class', 'kg-node-label')
        .attr('dy', d => Math.max(4, 3 + (d.observation_count || 1) * 1.5) + 10)
        .text(d => d.name.length > 16 ? d.name.slice(0, 14) + '..' : d.name);

    kgSimulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        edgeLabel.attr('x', d => (d.source.x + d.target.x) / 2)
            .attr('y', d => (d.source.y + d.target.y) / 2);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

function showKgProvenance(event, entity) {
    const popup = document.getElementById('kg-provenance-popup');
    let html = `<div style="color:#8b7ff8;font-weight:bold;margin-bottom:6px">${entity.name}</div>`;
    html += `<div style="color:#8888a0">Type: ${entity.type || 'unknown'}</div>`;
    html += `<div style="color:#8888a0">Observations: ${entity.observation_count || 0}</div>`;
    if (entity.first_observed_run) html += `<div style="color:#6a6a80;margin-top:4px">First seen: ${entity.first_observed_run}</div>`;
    if (entity.last_observed_run) html += `<div style="color:#6a6a80">Last seen: ${entity.last_observed_run}</div>`;
    // Find relationships
    const rels = kgEdges.filter(e => (e.source.id || e.source) === entity.id || (e.target.id || e.target) === entity.id);
    if (rels.length) {
        html += `<div style="color:#6a6a80;margin-top:6px">${rels.length} relationships</div>`;
        for (const r of rels.slice(0, 5)) {
            const other = (r.source.id || r.source) === entity.id ? (r.target.name || r.target.id || r.target) : (r.source.name || r.source.id || r.source);
            html += `<div style="color:#4a4a60;font-size:9px">- ${r.relationship_type} -> ${other}</div>`;
        }
    }
    popup.innerHTML = html;
    popup.classList.add('visible');
    popup.style.left = (event.clientX + 10) + 'px';
    popup.style.top = (event.clientY - 10) + 'px';
    // Close on next click anywhere
    setTimeout(() => {
        document.addEventListener('click', function closePopup() {
            popup.classList.remove('visible');
            document.removeEventListener('click', closePopup);
        }, { once: true });
    }, 50);
}

// === SUMMARY ===
function showSummary() {
    if(!headlineFindings.length&&!significantFindings.length) return;
    const box=document.getElementById('summary-box');
    let html=`<h2>Exploration Complete</h2><div class="summary-stats">${totalNodes} nodes | ${totalObs} observations | ${totalFindings} findings scored</div>`;
    for(const f of headlineFindings) html+=`<div class="summary-finding headline"><h3>Headline Finding</h3><p>${(f.finding_summary||'').slice(0,250)}</p></div>`;
    for(const f of significantFindings) html+=`<div class="summary-finding significant"><h3>Significant (${f.composite})</h3><p>${(f.finding_summary||'').slice(0,250)}</p></div>`;
    html+=`<div style="margin-top:18px;font-size:11px;color:#6a6a80">Click anywhere to dismiss</div>`;
    box.innerHTML=html;
    const ov=document.getElementById('summary-overlay');ov.classList.add('active');ov.onclick=()=>ov.classList.remove('active');
}

// === PLAYBACK ===
let playbackSpeed=10,playbackPaused=false,playbackEvents=[],playbackIndex=0,playbackResolve=null;
function togglePause(){playbackPaused=!playbackPaused;document.getElementById('play-btn').textContent=playbackPaused?'Play':'Pause';if(!playbackPaused&&playbackResolve){playbackResolve();playbackResolve=null;}}
function setSpeed(v){playbackSpeed=parseFloat(v);}
function scrubTo(pct){if(!playbackEvents.length)return;resetState();const t=Math.floor(pct/100*playbackEvents.length);for(let i=0;i<=t&&i<playbackEvents.length;i++)handleEvent(playbackEvents[i]);playbackIndex=t;}
function resetState(){nodes.clear();totalNodes=0;totalObs=0;maxDepth=0;totalFindings=0;selectedNodeId=null;headlineFindings=[];significantFindings=[];followupLinks=[];kgEntities=0;kgRelations=0;bbPosts=0;currentPhase='';bbPostsList.length=0;bbPullsList.length=0;kgNodes.length=0;kgEdges.length=0;lateralEdges.length=0;budgetAllocations.clear();cascadeResults.clear();equipNodeId=null;equipStatus='placeholder';equipBriefingContent='';document.getElementById('stat-nodes').textContent='0';document.getElementById('stat-obs').textContent='0';document.getElementById('stat-depth').textContent='0';document.getElementById('stat-findings').textContent='0';document.getElementById('log-body').innerHTML='';document.getElementById('kg-entities').textContent='0';document.getElementById('kg-relations').textContent='0';document.getElementById('kg-count').textContent='0';document.getElementById('bb-posts-label').textContent='0 posts';document.getElementById('bb-count').textContent='0';document.getElementById('bb-posts-container').innerHTML='';document.getElementById('phase-stage-strip').className='phase-stage-strip';document.getElementById('phase-stage-strip').textContent='';linkGroup.selectAll('*').remove();nodeGroup.selectAll('*').remove();if(kgSimulation){kgSimulation.stop();kgSimulation=null;}d3.select('#kg-graph-svg').selectAll('*').remove();}
async function startPlayback(data){isPlayback=true;playbackEvents=data;document.getElementById('playback-bar').classList.add('active');if(!data.length)return;const dur=data[data.length-1].elapsed_ms||1;for(let i=playbackIndex;i<data.length;i++){if(playbackPaused)await new Promise(r=>{playbackResolve=r;});playbackIndex=i;handleEvent(data[i]);document.getElementById('scrub').value=(i/data.length*100).toFixed(0);document.getElementById('playback-time').textContent=`${formatTime(data[i].elapsed_ms||0)} / ${formatTime(dur)}`;const next=data[i+1];if(next)await sleep(Math.min(((next.elapsed_ms||0)-(data[i].elapsed_ms||0))/playbackSpeed,2000));}finalizeAll();}
function formatTime(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return`${m}:${String(s%60).padStart(2,'0')}`;}
function sleep(ms){return new Promise(r=>setTimeout(r,Math.max(0,ms)));}

// === SOURCE SELECTION ===
function showSourceSelection(evt) {
    const overlay = document.getElementById('summary-overlay');
    const box = document.getElementById('summary-box');

    let html = `<div style="text-align:center;margin-bottom:28px">
        <div style="color:#8b7ff8;font-size:28px;font-weight:bold;letter-spacing:4px">MYCELIUM</div>
        <div style="color:#7a7a90;font-size:14px;font-style:italic;margin-top:6px">Engineered Curiosity</div>
    </div>
    <div style="font-size:14px;color:#c0c0d4;margin-bottom:16px">What do you want to explore?</div>
    <div style="font-size:11px;color:#7a7a90;margin-bottom:16px">
        Describe any information space. Mycelium will figure out how to access it,
        catalog everything it can reach, and show you what it found — before spending anything on AI analysis.
    </div>
    <textarea id="source-input" rows="3" placeholder="Examples:&#10;npm registry&#10;US federal regulations&#10;SEC 10-K filings for tech companies&#10;GitHub issues for kubernetes/kubernetes"
        style="width:100%;background:#0a0a14;border:1px solid #333;border-radius:4px;padding:12px;
        color:#d0d0dc;font-family:inherit;font-size:13px;resize:vertical;line-height:1.5"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitSource()}"></textarea>
    <button onclick="submitSource()"
        style="margin-top:12px;background:#8b7ff8;color:#fff;border:none;padding:10px 28px;
        border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:bold;
        letter-spacing:1px;width:100%">Explore</button>
    <div id="source-response" style="margin-top:16px;display:none"></div>`;

    box.innerHTML = html;
    overlay.classList.add('active');
    overlay.onclick = null;
    document.getElementById('source-info').textContent = 'Describe what you want to explore';
    // Focus the textarea
    setTimeout(() => document.getElementById('source-input')?.focus(), 100);
}

function submitSource() {
    const input = document.getElementById('source-input');
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;

    // Send to backend — it will figure out if we have a connector
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'select_source', query: text }));
    }

    // Show thinking state
    const btn = input.nextElementSibling;
    if (btn) { btn.textContent = 'Connecting...'; btn.disabled = true; }
    document.getElementById('source-info').textContent = `Figuring out how to access: ${text.slice(0, 60)}...`;
}

function showSourceResponse(evt) {
    // Backend figured out the source — show what it found or ask questions
    if (evt.status === 'connected') {
        document.getElementById('summary-overlay').classList.remove('active');
        document.getElementById('source-info').textContent = `Connected: ${evt.source_name || ''} — starting catalog...`;
        addLog('phase', `Connected to ${evt.source_name || 'data source'}`);
    } else if (evt.status === 'clarify') {
        // Backend needs more info
        const resp = document.getElementById('source-response');
        if (resp) {
            resp.style.display = 'block';
            resp.innerHTML = `<div style="padding:12px;background:#14141e;border-radius:4px;border-left:3px solid #8b7ff8">
                <div style="font-size:12px;color:#b0b0c4;line-height:1.5">${evt.message}</div>
            </div>`;
        }
        // Re-enable button
        const btn = document.querySelector('#summary-box button');
        if (btn) { btn.textContent = 'Explore'; btn.disabled = false; }
    } else if (evt.status === 'not_exploration') {
        const resp = document.getElementById('source-response');
        if (resp) {
            resp.style.display = 'block';
            resp.innerHTML = `<div style="padding:12px;background:#14141e;border-radius:4px;border-left:3px solid #efcf6f">
                <div style="font-size:12px;color:#d0c090;line-height:1.5">${evt.message}</div>
            </div>`;
        }
        const btn = document.querySelector('#summary-box button');
        if (btn) { btn.textContent = 'Explore'; btn.disabled = false; }
    } else if (evt.status === 'unavailable') {
        const resp = document.getElementById('source-response');
        if (resp) {
            resp.style.display = 'block';
            resp.innerHTML = `<div style="padding:12px;background:#14141e;border-radius:4px;border-left:3px solid #8b7ff8">
                <div style="font-size:12px;color:#b0b0c4;line-height:1.5;white-space:pre-line">${evt.message}</div>
            </div>`;
        }
        const btn = document.querySelector('#summary-box button');
        if (btn) { btn.textContent = 'Explore'; btn.disabled = false; }
    }
}

// === TIER SELECTION ===
function showTierSelection(evt) {
    const tiers = evt.tiers || [];
    const records = evt.catalog_records || 0;
    const overlay = document.getElementById('summary-overlay');
    const box = document.getElementById('summary-box');

    let html = `<h2>Catalog Complete</h2>
        <div class="summary-stats">${records.toLocaleString()} records scanned at zero cost</div>
        <div style="margin:16px 0;font-size:12px;color:#9898b0">Choose an investigation depth:</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">`;

    for (const t of tiers) {
        html += `<div style="flex:1;min-width:140px;background:#0a0a14;border:1px solid #333;border-radius:6px;padding:14px;cursor:pointer;transition:border-color 0.2s"
            onmouseover="this.style.borderColor='#8b7ff8'" onmouseout="this.style.borderColor='#333'"
            onclick="selectTier(${t.budget})">
            <div style="font-size:14px;font-weight:bold;color:#8b7ff8">${t.name}</div>
            <div style="font-size:20px;color:#d0d0dc;margin:6px 0">$${t.budget}</div>
            <div style="font-size:11px;color:#8888a0">${t.time_estimate}${t.estimated_nodes ? ` | ~${t.estimated_nodes} nodes` : ''}</div>
            <div style="font-size:11px;color:#8888a0;margin-top:4px">${t.clusters_covered} anomaly clusters</div>
            <div style="font-size:10px;color:#7a7a90;margin-top:6px;line-height:1.4">${t.depth}</div>
        </div>`;
    }

    html += `</div>
        <div style="margin-top:16px;display:flex;align-items:center;gap:10px">
            <span style="font-size:12px;color:#8888a0">Custom:</span>
            <input id="custom-budget-input" type="number" min="1" max="500" value="10"
                style="width:70px;background:#0a0a14;border:1px solid #333;border-radius:3px;padding:4px 8px;color:#d0d0dc;font-family:inherit;font-size:13px">
            <button onclick="selectTier(parseFloat(document.getElementById('custom-budget-input').value))"
                style="background:#8b7ff8;color:#fff;border:none;padding:6px 16px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px">Proceed</button>
        </div>`;

    box.innerHTML = html;
    overlay.classList.add('active');
    overlay.onclick = null; // don't close on backdrop click
}

function selectTier(budget) {
    if (!budget || budget <= 0) return;
    // Send choice back to backend via WebSocket
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'authorize', budget: budget }));
    }
    hideTierSelection();
    addLog('phase', `Budget authorized: $${budget.toFixed(2)}`);
}

function hideTierSelection() {
    document.getElementById('summary-overlay').classList.remove('active');
}

// === INIT ===
async function init(){
    initZoom();
    const params=new URLSearchParams(window.location.search);
    const eventsUrl=params.get('events');
    if(eventsUrl){
        document.getElementById('source-info').textContent='Loading recording...';
        try{
            // Load supplementary files in parallel with events
            const [evtResp] = await Promise.all([
                fetch(eventsUrl),
                loadWorkspaceState(eventsUrl),
                loadKnowledgeGraph(eventsUrl),
            ]);
            const text=await evtResp.text();
            const events=text.trim().split('\n').map(l=>JSON.parse(l));
            document.getElementById('source-info').textContent=`Playback: ${events.length} events`;
            startPlayback(events);
        }
        catch(e){document.getElementById('source-info').textContent=`Error: ${e.message}`;}
    } else { connectWS(); }
}
init();
</script>
